<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🧠 Rodinný Kvíz</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#1a1a2e;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.c{width:100%;max-width:500px;padding:16px;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.scr{display:none;width:100%;animation:fi .4s ease}
.scr.on{display:flex;flex-direction:column;align-items:center;gap:18px}
@keyframes fi{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes cfall{0%{transform:translateY(-100vh) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.pulse{animation:pulse .3s ease}
h1{font-size:2em;text-align:center;background:linear-gradient(135deg,#f5c518,#e94560);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
h2{font-size:1.4em;text-align:center;color:#f5c518}
.sub{color:#aaa;text-align:center;font-size:1em}
.code-display{font-size:3em;font-weight:800;letter-spacing:12px;color:#f5c518;text-align:center;padding:16px;background:#16213e;border-radius:16px;width:100%}
input[type=text]{width:100%;max-width:300px;padding:14px 20px;font-size:1.2em;border:2px solid #333;border-radius:14px;background:#16213e;color:#fff;text-align:center;outline:none;-webkit-appearance:none}
input:focus{border-color:#e94560}
button{border:none;padding:14px 28px;border-radius:14px;font-size:1.1em;font-weight:600;cursor:pointer;transition:all .15s;color:#fff;width:100%;max-width:400px;-webkit-appearance:none}
button:active{transform:scale(.96)}
.bp{background:linear-gradient(135deg,#e94560,#c62828)}
.bg{background:linear-gradient(135deg,#f5c518,#ff6d00);color:#1a1a2e}
.ba{background:#16213e;border:2px solid #333;text-align:left;padding:16px 20px;font-size:1em;max-width:100%}
.ba.correct{background:#00c853!important;border-color:#00c853!important}
.ba.wrong{background:#ff1744!important;border-color:#ff1744!important}
.ba.dim{opacity:.4;pointer-events:none}
.ba.picked{border-color:#f5c518!important;border-width:3px}
.ba.hidden5050{display:none!important}
.lobby-list{width:100%;display:flex;flex-direction:column;gap:8px}
.lp{display:flex;align-items:center;gap:12px;padding:12px 16px;background:#16213e;border-radius:10px;font-size:1.1em}
.lp .badge{font-size:.75em;padding:2px 8px;border-radius:8px;background:#7c4dff;margin-left:auto}
.dot{border-radius:50%;flex-shrink:0}
.timer-text{font-size:2.2em;font-weight:700;font-variant-numeric:tabular-nums}
.tbar-wrap{width:100%;height:6px;background:#333;border-radius:3px;overflow:hidden}
.tbar{height:100%;background:#00c853;transition:width .15s linear;border-radius:3px}
.tbar.warn{background:#f5c518}
.tbar.danger{background:#ff1744}
.prog-wrap{width:100%;height:8px;background:#333;border-radius:4px;overflow:hidden}
.prog{height:100%;background:linear-gradient(90deg,#e94560,#f5c518);transition:width .5s ease;border-radius:4px}
.cat{display:inline-block;padding:6px 16px;border-radius:20px;font-size:.9em;font-weight:600;background:#16213e;border:1px solid #444}
.special{background:linear-gradient(135deg,#f5c518,#ff6d00);color:#1a1a2e;font-weight:700;border:none}
.qtext{font-size:1.25em;text-align:center;line-height:1.4}
.answers{display:flex;flex-direction:column;gap:10px;width:100%}
.sboard{width:100%;display:flex;flex-direction:column;gap:8px}
.srow{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#16213e;border-radius:10px}
.sleft{display:flex;align-items:center;gap:10px}
.sname{font-weight:600}
.sstreak{font-size:.8em;color:#f5c518}
.spts{font-size:1.2em;font-weight:700;color:#f5c518}
.rcard{text-align:center;padding:20px;background:#16213e;border-radius:16px;width:100%}
.ricon{font-size:3em;margin-bottom:8px}
.rpts{font-size:1.3em;font-weight:700;color:#f5c518}
.rdet{color:#aaa;font-size:.9em;margin-top:4px}
.wait{color:#aaa;font-size:1.1em;text-align:center;animation:pulse 1.5s infinite}
.podium{display:flex;align-items:flex-end;justify-content:center;gap:16px;margin:16px 0;width:100%}
.pp{display:flex;flex-direction:column;align-items:center;gap:6px}
.pp .medal{font-size:2.5em}
.pp .pn{font-weight:700;font-size:1.1em}
.pp .ps{color:#f5c518;font-size:1.1em;font-weight:700}
.pbar{width:70px;border-radius:8px 8px 0 0}
.p1 .pbar{height:110px;background:linear-gradient(180deg,#f5c518,#e65100)}
.p2 .pbar{height:75px;background:linear-gradient(180deg,#90a4ae,#546e7a)}
.p3 .pbar{height:50px;background:linear-gradient(180deg,#a1887f,#6d4c41)}
.conf{position:fixed;top:-20px;width:10px;height:10px;border-radius:2px;animation:cfall 3s linear forwards;pointer-events:none;z-index:9999}
.foot{color:#555;font-size:.75em;text-align:center}
.err{color:#ff1744;font-size:.9em;text-align:center;min-height:1.2em}
.answered-info{color:#f5c518;font-size:1em;text-align:center}
.jr-toggle{display:flex;align-items:center;gap:10px;padding:10px 16px;background:#16213e;border-radius:12px;cursor:pointer;-webkit-user-select:none;user-select:none}
.jr-toggle input{width:20px;height:20px;accent-color:#7c4dff}
.jr-toggle .jr-label{font-size:1em;color:#ccc}
.jr-toggle .jr-desc{font-size:.8em;color:#888}
.btn5050{background:linear-gradient(135deg,#7c4dff,#536dfe);max-width:200px;padding:10px 20px;font-size:1em;margin:0 auto}
.btn5050:disabled{opacity:.4;cursor:default}
</style>
</head>
<body>
<div class="c">

<div class="scr on" id="s-home">
<h1>🧠 Rodinný Kvíz</h1>
<p class="sub">Multiplayer — každý na svém mobilu!</p>
<input type="text" id="myname" placeholder="Tvoje jméno" maxlength="12">
<label class="jr-toggle">
<input type="checkbox" id="jr-check">
<div>
<div class="jr-label">🧒 Junior mód</div>
<div class="jr-desc">+5s, 3× nápověda 50:50, bonus body</div>
</div>
</label>
<button class="bp" onclick="doCreate()">🎮 Vytvořit hru</button>
<button class="bg" onclick="goJoin()">🔗 Připojit se</button>
<p class="foot">v6.1 | ⚡ Arc</p>
</div>

<div class="scr" id="s-join">
<h2>🔗 Připojit se</h2>
<p class="sub">Zadej kód hry:</p>
<input type="text" id="joincode" placeholder="ABCD" maxlength="4" style="font-size:2em;letter-spacing:8px;text-transform:uppercase">
<button class="bp" onclick="doJoin()">Připojit se</button>
<p class="err" id="join-err"></p>
<button class="bg" onclick="show('s-home')" style="max-width:200px;padding:10px;font-size:.9em">&#x2B05; Zpět</button>
</div>

<div class="scr" id="s-lobby">
<h2>🏠 Čekárna</h2>
<div class="code-display" id="lobby-code"></div>
<p class="sub">Sdílejte tento kód ostatním hráčům</p>
<div class="lobby-list" id="lobby-list"></div>
<button class="bp" id="btn-start" onclick="doStart()" style="display:none">🚀 Spustit hru!</button>
<p class="wait" id="lobby-wait" style="display:none">Čekám na hostitele...</p>
</div>

<div class="scr" id="s-question">
<div class="prog-wrap"><div class="prog" id="prog"></div></div>
<div style="text-align:center">
<span class="sub" id="qnum"></span><br>
<span id="qcat"></span>
</div>
<div class="qtext" id="qtxt"></div>
<div class="timer-text" id="ttxt">15</div>
<div class="tbar-wrap"><div class="tbar" id="tbar"></div></div>
<div id="hint-wrap" style="text-align:center"></div>
<div class="answers" id="ans"></div>
<div class="answered-info" id="ans-info"></div>
</div>

<div class="scr" id="s-wait-ans">
<div class="rcard" id="my-result"></div>
<p class="wait">⏳ Čekám na ostatní hráče...</p>
<p class="answered-info" id="wait-info"></p>
</div>

<div class="scr" id="s-round">
<div class="rcard" id="round-card"></div>
<div class="sboard" id="round-score"></div>
<button class="bp" id="btn-next" onclick="doNext()" style="display:none">&#x25B6; Další otázka</button>
<p class="wait" id="round-wait" style="display:none">Čekám na hostitele...</p>
</div>

<div class="scr" id="s-final">
<h1>🏆 Výsledky</h1>
<div class="podium" id="podium"></div>
<div class="sboard" id="final-score"></div>
<button class="bg" onclick="location.reload()" style="margin-top:12px">🔄 Hrát znovu</button>
<p class="foot">Díky za hru! 🧠⚡</p>
</div>

</div>

<script>
var API = '/api/room';
var myPid = '';
var roomCode = '';
var isHost = false;
var isJunior = false;
var hints5050 = 3;
var pollTimer = null;
var lastV = -1;
var curScreen = 'home';
var shownQ = -1;
var qStartLocal = 0;
var maxTime = 15;
var myAnswered = false;
var myAnsStr = ''; /* "idx:time" sent in every poll after answering */
var timerIv = null;
/* Audio */
var actx=null;
function initA(){try{var C=window.AudioContext||window.webkitAudioContext;if(!actx&&C)actx=new C();if(actx&&actx.state==='suspended')actx.resume()}catch(e){}}
function beep(f,d,t,v){try{if(!actx)return;var o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);o.type=t||'sine';o.frequency.value=f;g.gain.value=v||.12;o.start();g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+d);o.stop(actx.currentTime+d)}catch(e){}}
function sndOk(){beep(523,.1);setTimeout(function(){beep(659,.1)},100);setTimeout(function(){beep(784,.15)},200)}
function sndBad(){beep(200,.3,'sawtooth',.1)}
function sndTick(){beep(800,.05,'sine',.08)}
function sndEnd(){beep(523,.15);setTimeout(function(){beep(659,.15)},150);setTimeout(function(){beep(784,.15)},300);setTimeout(function(){beep(1047,.3)},450)}

/* Helpers */
function G(id){return document.getElementById(id)}
function show(id){
  var all=document.querySelectorAll('.scr');
  for(var i=0;i<all.length;i++) all[i].classList.remove('on');
  G(id).classList.add('on');
  curScreen=id;
}
function getName(){var n=G('myname').value.trim();if(!n)n='Hráč '+Math.floor(Math.random()*99+1);return n;}
function getJunior(){return G('jr-check').checked?1:0;}

function apiGet(action, params, cb) {
  var url=API+'?action='+action;
  var keys=Object.keys(params||{});
  for(var i=0;i<keys.length;i++) url+='&'+keys[i]+'='+encodeURIComponent(params[keys[i]]);
  var xhr=new XMLHttpRequest();
  xhr.open('GET',url,true);
  xhr.onload=function(){try{cb(null,JSON.parse(xhr.responseText))}catch(e){cb(e)}};
  xhr.onerror=function(){cb(new Error('network'))};
  xhr.timeout=8000;
  xhr.ontimeout=function(){cb(new Error('timeout'))};
  xhr.send();
}

/* CREATE */
function doCreate(){
  initA();
  var name=getName();
  isJunior=!!getJunior();
  hints5050=isJunior?3:0;
  apiGet('create',{name:name,junior:getJunior()},function(err,d){
    if(err||!d||!d.ok){alert('Chyba při vytváření.');return;}
    myPid=d.pid; roomCode=d.code; isHost=true; lastV=-1;
    G('lobby-code').textContent=roomCode;
    G('btn-start').style.display='none';
    G('lobby-wait').style.display='none';
    show('s-lobby');
    startPoll();
  });
}

/* JOIN */
function goJoin(){G('joincode').value='';G('join-err').textContent='';show('s-join');}
function doJoin(){
  initA();
  var code=G('joincode').value.trim().toUpperCase();
  if(code.length!==4){G('join-err').textContent='Zadej 4-písmenný kód!';return;}
  G('join-err').textContent='⏳ Připojuji se...';
  var name=getName();
  isJunior=!!getJunior();
  hints5050=isJunior?3:0;
  apiGet('join',{code:code,name:name,junior:getJunior()},function(err,d){
    if(err||!d){G('join-err').textContent='❌ Chyba sítě.';return;}
    if(!d.ok){
      var msgs={not_found:'❌ Místnost "'+code+'" neexistuje.',full:'❌ Plná.',already_started:'❌ Hra už běží.'};
      G('join-err').textContent=msgs[d.error]||('❌ '+d.error);return;
    }
    myPid=d.pid; roomCode=code; isHost=false; lastV=-1;
    G('lobby-code').textContent=roomCode;
    G('btn-start').style.display='none';
    G('lobby-wait').style.display='block';
    show('s-lobby');
    startPoll();
  });
}

/* START */
function doStart(){
  G('btn-start').textContent='⏳ Startuji...';
  G('btn-start').disabled=true;
  apiGet('start',{code:roomCode,pid:myPid},function(err,d){
    G('btn-start').textContent='🚀 Spustit hru!';
    G('btn-start').disabled=false;
    if(err||!d||!d.ok) alert('Chyba: '+(d&&d.error?d.error:'?'));
  });
}

/* NEXT */
function doNext(){
  G('btn-next').style.display='none';
  apiGet('next',{code:roomCode,pid:myPid},function(){});
}

/* 50:50 — server picks which answers to hide */
function use5050(){
  if(hints5050<=0||myAnswered) return;
  apiGet('hint5050',{code:roomCode,pid:myPid},function(err,d){
    if(err||!d||!d.ok) return;
    hints5050=d.remaining;
    beep(600,.08);
    setTimeout(function(){beep(800,.08)},80);
    var btns=G('ans').querySelectorAll('.ba');
    for(var j=0;j<d.hide.length;j++){
      if(d.hide[j]>=0 && d.hide[j]<btns.length) btns[d.hide[j]].classList.add('hidden5050');
    }
    render5050btn();
  });
}

function render5050btn(){
  var wrap=G('hint-wrap');
  if(!isJunior||myAnswered){wrap.innerHTML='';return;}
  if(hints5050>0){
    wrap.innerHTML='<button class="btn5050" onclick="use5050()">50:50 ('+hints5050+'x)</button>';
  } else {
    wrap.innerHTML='<button class="btn5050" disabled>50:50 (0x)</button>';
  }
}

/* POLLING */
function startPoll(){
  if(pollTimer)clearInterval(pollTimer);
  doPoll();
  pollTimer=setInterval(doPoll,1500);
}

function doPoll(){
  var pollParams={code:roomCode,pid:myPid};
  if(myAnsStr) pollParams.myAns=myAnsStr;
  apiGet('poll',pollParams,function(err,d){
    if(err||!d||!d.ok) return;
    if(d.v===lastV && curScreen!=='s-lobby') return;
    lastV=d.v;
    var players=d.players||[];

    /* LOBBY */
    if(d.state==='lobby'){
      renderLobby(players);
      if(isHost){
        G('btn-start').style.display=players.length>=2?'block':'none';
        G('lobby-wait').style.display='none';
      } else {
        G('btn-start').style.display='none';
        G('lobby-wait').style.display='block';
      }
      if(curScreen!=='s-lobby') show('s-lobby');
    }

    /* PLAYING */
    if(d.state==='playing'){
      if(shownQ!==d.curQ){
        shownQ=d.curQ;
        myAnswered=false;
        myAnsStr='';
        showQuestion(d);
      } else if(myAnswered){
        if(d.answeredCount) G('wait-info').textContent='Odpovědělo '+d.answeredCount+'/'+d.totalPlayers;
      }
    }

    /* ROUND RESULT */
    if(d.state==='round-result'){
      if(curScreen!=='s-round'||shownQ!==d.curQ){
        shownQ=d.curQ;
        showRoundResult(d);
      }
    }

    /* FINAL */
    if(d.state==='final'){
      if(curScreen!=='s-final') showFinal(d.finalPlayers||players);
    }
  });
}

/* LOBBY render */
function renderLobby(pls){
  var h='';
  for(var i=0;i<pls.length;i++){
    var p=pls[i];
    var badge=p.junior?'<span class="badge">🧒 Junior</span>':'';
    h+='<div class="lp"><div class="dot" style="width:20px;height:20px;background:'+p.color+'"></div><span>'+p.name+'</span>'+badge+'</div>';
  }
  G('lobby-list').innerHTML=h;
}

/* QUESTION */
function specType(i){if(i===4)return'blitz';if(i===9)return'bet';if(i===14)return'finale';return'';}
function getMaxTime(s){
  var base=15;
  if(s==='blitz') base=7;
  if(s==='finale') base=20;
  if(isJunior) base+=5;
  return base;
}

function showQuestion(d){
  clearInterval(timerIv);
  var q=d.question; if(!q)return;
  var sp=specType(q.idx);
  maxTime=getMaxTime(sp);

  show('s-question');
  G('prog').style.width=(q.idx/15*100)+'%';
  G('qnum').textContent='Otázka '+(q.idx+1)+' / 15';

  var catH='<span class="cat">'+q.cat+'</span>';
  if(sp==='blitz') catH='<span class="cat special">⚡ BLESKOVÉ KOLO ⚡</span>';
  if(sp==='finale') catH='<span class="cat special">👑 VELKÉ FINÁLE 👑</span>';
  G('qcat').innerHTML=catH;
  G('qtxt').textContent=q.q;
  G('ans-info').textContent='';

  var labels=['A','B','C','D'],aH='';
  for(var i=0;i<q.a.length;i++){
    aH+='<button class="ba" id="a'+i+'" onclick="pickAnswer('+i+')">'+labels[i]+'. '+q.a[i]+'</button>';
  }
  G('ans').innerHTML=aH;
  render5050btn();

  if(d.myAnswered){
    myAnswered=true;
    var btns=G('ans').querySelectorAll('.ba');
    for(var j=0;j<btns.length;j++){btns[j].onclick=null;btns[j].classList.add('dim');}
    G('ans-info').textContent='✅ Už jsi odpověděl/a';
    G('hint-wrap').innerHTML='';
    return;
  }

  var serverElapsed=(d.serverTime-d.qStartTime)/1000;
  /* Junior gets extra time on server too, but locally we just calculate based on our maxTime */
  qStartLocal=Date.now()-(serverElapsed*1000);
  updateTimer();
  timerIv=setInterval(updateTimer,200);
}

function updateTimer(){
  var elapsed=(Date.now()-qStartLocal)/1000;
  var rem=maxTime-elapsed;
  G('tbar').style.width=Math.max(0,rem/maxTime*100)+'%';
  if(rem<=3) G('tbar').className='tbar danger';
  else if(rem<=6) G('tbar').className='tbar warn';
  else G('tbar').className='tbar';
  G('ttxt').textContent=Math.ceil(Math.max(0,rem));
  if(rem<=0){
    clearInterval(timerIv);
    if(!myAnswered){
      pickAnswer(-1);
      if(isHost) apiGet('timeout',{code:roomCode,pid:myPid},function(){});
    }
  }
}

function pickAnswer(idx){
  if(myAnswered) return;
  myAnswered=true;
  initA();
  clearInterval(timerIv);
  G('hint-wrap').innerHTML='';
  var elapsed=(Date.now()-qStartLocal)/1000;

  var btns=G('ans').querySelectorAll('.ba');
  for(var i=0;i<btns.length;i++){
    btns[i].onclick=null;
    if(i===idx) btns[i].classList.add('picked');
    else if(!btns[i].classList.contains('hidden5050')) btns[i].classList.add('dim');
  }

  myAnsStr=idx+':'+elapsed.toFixed(1);
  apiGet('answer',{code:roomCode,pid:myPid,idx:idx,time:elapsed.toFixed(1)},function(){});

  var icon=idx===-1?'⏰':'✋';
  var msg=idx===-1?'Čas vypršel!':'Odpověď odeslána!';
  G('my-result').innerHTML='<div class="ricon">'+icon+'</div><div style="font-size:1.3em;font-weight:700">'+msg+'</div>';
  G('wait-info').textContent='';
  show('s-wait-ans');
  try{if(idx>=0)beep(500,.1);else sndBad()}catch(e){}
}

/* ROUND RESULT */
function showRoundResult(d){
  clearInterval(timerIv);
  G('hint-wrap').innerHTML='';
  var me=d.myIdx>=0?d.players[d.myIdx]:null;
  var ok=me&&me.lastOk;
  try{if(ok)sndOk();else sndBad()}catch(e){}

  var icon=ok?'✅':'❌';
  var m=ok?'Správně!':'Špatně!';
  var pts=me&&me.lastPts>0?('+'+me.lastPts+' bodů'):'0 bodů';
  var jrNote=me&&me.junior&&me.lastPts>0?' (🧒 junior bonus)':'';
  G('round-card').innerHTML='<div class="ricon">'+icon+'</div><div style="font-size:1.3em;font-weight:700">'+m+'</div><div class="rpts">'+pts+jrNote+'</div><div class="rdet">Správně: '+d.correctText+'</div>';
  if(ok) G('round-card').classList.add('pulse');
  else G('round-card').classList.remove('pulse');

  var sorted=(d.roundPlayers||d.players).slice().sort(function(a,b){return b.score-a.score});
  renderScoreboard('round-score',sorted);

  if(isHost){
    G('btn-next').style.display='block';
    G('round-wait').style.display='none';
  } else {
    G('btn-next').style.display='none';
    G('round-wait').style.display='block';
  }
  show('s-round');
}

function renderScoreboard(elId,sorted){
  var medals=['🥇','🥈','🥉','4.'],h='';
  for(var i=0;i<sorted.length;i++){
    var p=sorted[i];
    var st=p.streak>=3?(' 🔥'+p.streak):'';
    var jrTag=p.junior?' 🧒':'';
    h+='<div class="srow"><div class="sleft"><div class="dot" style="width:14px;height:14px;background:'+p.color+'"></div><span class="sname">'+medals[i]+' '+p.name+jrTag+'</span><span class="sstreak">'+st+'</span></div><span class="spts">'+p.score+'</span></div>';
  }
  G(elId).innerHTML=h;
}

/* FINAL */
function showFinal(pls){
  clearInterval(pollTimer);
  clearInterval(timerIv);
  try{sndEnd()}catch(e){}
  show('s-final');
  var sorted=pls.slice().sort(function(a,b){return b.score-a.score});
  var medals=['🥇','🥈','🥉','4.'];
  var order=sorted.length>=3?[1,0,2]:[1,0];
  var ph='';
  for(var oi=0;oi<order.length;oi++){
    var rank=order[oi];
    if(rank<sorted.length){
      var p=sorted[rank];
      var jrTag=p.junior?' 🧒':'';
      ph+='<div class="pp p'+(rank+1)+'"><div class="medal">'+medals[rank]+'</div><div class="pn" style="color:'+p.color+'">'+p.name+jrTag+'</div><div class="ps">'+p.score+'b</div><div class="pbar"></div></div>';
    }
  }
  G('podium').innerHTML=ph;
  renderScoreboard('final-score',sorted);
  spawnConfetti();
}

function spawnConfetti(){
  var cols=['#e94560','#f5c518','#00c853','#2979ff','#ff6d00','#aa00ff','#f50057'];
  for(var i=0;i<60;i++){
    var el=document.createElement('div');
    el.className='conf';
    el.style.left=Math.random()*100+'vw';
    el.style.background=cols[Math.floor(Math.random()*cols.length)];
    el.style.width=(6+Math.random()*8)+'px';
    el.style.height=(6+Math.random()*8)+'px';
    el.style.animationDuration=(2+Math.random()*2)+'s';
    el.style.animationDelay=(Math.random()*1.5)+'s';
    document.body.appendChild(el);
    (function(e){setTimeout(function(){if(e.parentNode)e.parentNode.removeChild(e)},5000)})(el);
  }
}
</script>
